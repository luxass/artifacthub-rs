[package]
name = "artifacthub-mcp"
version = "0.2.0"
edition = "2024"
license = "MIT"
description = "MCP server for Artifact Hub — search packages, get details, view changelogs, and extract Helm chart values"
repository = "https://github.com/luxass/artifacthub-mcp"
readme = "README.md"

[dependencies]
rmcp = { version = "=1.7.0", features = ["server", "transport-io"] }
tokio = { version = "=1.52.3", features = ["rt-multi-thread", "macros"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
reqwest = { version = "=0.13.3", features = ["json", "query"] }
schemars = { version = "=1.2.1", features = ["derive"] }
flate2 = "=1.1.9"
tar = "=0.4.46"
clap = { version = "=4.6.1", features = ["derive"] }

[dev-dependencies]
wiremock = "=0.6.5"
