[package]
name = "artifacthub-mcp"
version = "0.1.2"
edition = "2024"
license = "MIT"
description = "CLI to interact with Artifact Hub, providing package search, details, and management functionalities"
repository = "https://github.com/luxass/artifacthub-mcp"
readme = "README.md"

[dependencies]
rmcp = { version = "=1.7.0", features = ["server", "transport-io"] }
tokio = { version = "=1.52.3", features = ["full"] }
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.149"
anyhow = "=1.0.102"
reqwest = { version = "=0.13.3", features = ["json"] }
chrono = "=0.4.44"
urlencoding = "=2.1.3"
flate2 = "=1.1.9"
tar = "=0.4.46"
