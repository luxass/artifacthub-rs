name: Release

permissions: {}

on:
  push:
    branches:
      - main
    tags:
      - "artifacthub-mcp-v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    name: Release-plz
    if: ${{ github.repository_owner == 'luxass' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust
        uses: oxc-project/setup-rust@23f38cfb0c04af97a055f76acee94d5be71c7c82 # v1.0.16
        with:
          cache-key: release

      - name: Generate GitHub token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: generate-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run release-plz
        uses: release-plz/action@v0.5.129
        env:
          GITHUB_TOKEN: ${{ steps.generate-token.outputs.token }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build ${{ matrix.target }}
    if: ${{ startsWith(github.ref, 'refs/tags/artifacthub-mcp-v') }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Rust
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          rustup show
          if ! rustup target list --installed | grep -q "^${TARGET}$"; then
            rustup target add "$TARGET"
          fi

      - name: Test
        shell: bash
        run: cargo test

      - name: Build release
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: cargo build --release --target "$TARGET"

      - name: Package artifact
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          ARCHIVE: ${{ matrix.archive }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#artifacthub-mcp-v}"
          name="artifacthub-mcp-${version}-${TARGET}"
          bin="target/${TARGET}/release/artifacthub-mcp"

          mkdir -p dist
          if [ "${ARCHIVE}" = "zip" ]; then
            bin="${bin}.exe"
            mkdir -p "${name}"
            cp LICENSE "${name}/"
            cp "${bin}" "${name}/"
            powershell -Command "Compress-Archive -Path '${name}' -DestinationPath 'dist/${name}.zip'"
          else
            mkdir -p "${name}"
            cp LICENSE "${name}/"
            cp "${bin}" "${name}/"
            tar -C . -czf "dist/${name}.tar.gz" "${name}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-${{ matrix.target }}
          path: dist/*
          retention-days: 1

  checksums:
    name: Generate checksums
    if: ${{ startsWith(github.ref, 'refs/tags/artifacthub-mcp-v') }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bin-*
          merge-multiple: true
          path: dist

      - name: Generate SHA256
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > SHA256SUMS

      - name: Upload checksums
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: checksums
          path: dist/SHA256SUMS
          retention-days: 1

  create-release:
    name: Create GitHub Release
    if: ${{ startsWith(github.ref, 'refs/tags/artifacthub-mcp-v') }}
    runs-on: ubuntu-latest
    needs: checksums
    permissions:
      contents: write
    environment:
      name: release
      deployment: false
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bin-*
          merge-multiple: true
          path: dist

      - name: Download checksums
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: checksums
          path: dist

      - name: generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
          permission-contents: write

      - name: Create release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          gh release create "$tag" dist/* \
            --title "$tag" \
            --generate-notes \
            --verify-tag
