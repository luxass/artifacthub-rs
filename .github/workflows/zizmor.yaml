name: GitHub Actions Security Analysis

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - ".github/workflows/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/**"

permissions: {}

jobs:
  zizmor:
    permissions:
      # read workflow runs and history
      actions: read
      # checkout repository contents
      contents: read
      # upload SARIF results to GitHub Security tab
      security-events: write
      # OIDC token for GitHub API authentication
      id-token: write
    uses: luxass/shared-workflows/.github/workflows/reusable-ci-security.yaml@6c46d97f278c967b6c64f4ede147cfeb3e734812 # v0.8.1
