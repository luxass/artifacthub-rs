[package]
name = "artifacthub-client"
version = "0.1.0"
edition = "2024"
license = "MIT"
description = "Rust client library for the Artifact Hub API"
repository = "https://github.com/luxass/artifacthub-mcp"

[dependencies]
serde = { version = "=1.0.228", features = ["derive"] }
serde_json = "=1.0.150"
reqwest = { version = "=0.13.3", features = ["json", "query"] }
